[phases.setup]
nixPkgs = ["nodejs_20", "python312"]

[phases.install]
cmds = [
  "pip install -r backend/requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cp -r frontend/dist backend/frontend_dist"
]

[start]
cmd = "python -c \"import sys; sys.path.insert(0,'backend'); import uvicorn; uvicorn.run('main:app', host='0.0.0.0', port=int(__import__('os').environ.get('PORT',8000)))\""
